<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQLExplorer — Belajar SQL Audit</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <i class="ti ti-terminal-2 brand-icon"></i>
        <h1>SQLExplorer</h1>
      </div>
      <div class="header-right">
        <!-- <button id="btn-stability" class="ghost-btn" type="button" disabled title="Jalankan 20 query campuran, cek worker tetap hidup">
          <i class="ti ti-test-pipe"></i> Uji Stabilitas
        </button> -->
        <button id="btn-audit" class="ghost-btn" type="button" title="Lihat & export audit log hasil query">
          <i class="ti ti-clipboard-list"></i> Riwayat
        </button>
        <button id="btn-reference" class="ghost-btn" type="button" title="Buka glosarium & FAQ SQL">
          <i class="ti ti-book-2"></i> Referensi
        </button>
        <button id="btn-theme-toggle" class="theme-toggle-btn" title="Toggle Theme" type="button">
          <!-- Sun Icon (default for Light Mode) -->
          <i class="ti ti-sun icon-sun"></i>
          <!-- Moon Icon (hidden by default) -->
          <i class="ti ti-moon icon-moon"></i>
        </button>
        <div id="db-status" class="db-status">
          <i class="ti ti-database"></i>
          <span>Belum ada database dimuat</span>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <aside class="panel panel-schema" id="panel-schema" aria-label="Schema">
        <div class="panel-title">
          <span>Schema</span>
          <button id="btn-collapse-schema" class="panel-toggle-btn" title="Collapse Schema">
            <i class="ti ti-chevron-left"></i>
          </button>
        </div>
        <div class="panel-collapsed-view" id="btn-expand-schema" title="Expand Schema">
          <button class="panel-toggle-btn">
            <i class="ti ti-chevron-right"></i>
          </button>
          <span class="vertical-text">SCHEMA</span>
        </div>
        <div class="panel-content-wrapper">
          <div id="file-loader" class="file-loader-wrapper"></div>
          <div id="schema-browser" class="panel-body"></div>
        </div>
      </aside>

      <section id="panel-workspace" class="panel panel-workspace" aria-label="Editor dan Hasil">
        <div class="panel-title">
          <span>Query Editor</span>
          <div style="display: flex; gap: 8px;">
            <button id="btn-toggle-editor" class="panel-toggle-btn" title="Minimize/Expand Editor" type="button">
              <i id="editor-toggle-icon" class="ti ti-chevron-up"></i>
            </button>
            <button id="btn-maximize-editor" class="panel-toggle-btn" title="Maximize/Restore Editor" type="button">
              <i id="editor-maximize-icon" class="ti ti-maximize"></i>
            </button>
          </div>
        </div>
        <div id="query-editor" class="panel-body editor-slot"></div>
        <div class="editor-actions">
          <div class="actions-left">
            <button id="run-query" type="button" class="btn-primary">
              <i class="ti ti-player-play"></i>
              Run <kbd>⌘/Ctrl+Enter</kbd>
            </button>
            <button id="export-csv" type="button" class="btn-secondary" disabled>
              <i class="ti ti-download"></i>
              Export CSV
            </button>
          </div>
          <span id="query-meta" class="query-meta"></span>
        </div>
        <div id="editor-resize-handle" class="resize-handle-horizontal"></div>
        <div id="result-grid" class="panel-body result-slot" aria-live="polite"></div>
      </section>

      <aside class="panel panel-learning" id="panel-learning" aria-label="Learning">
        <div class="panel-title">
          <span>Learning</span>
          <button id="btn-collapse-learning" class="panel-toggle-btn" title="Collapse Learning">
            <i class="ti ti-chevron-right"></i>
          </button>
        </div>
        <div class="panel-collapsed-view" id="btn-expand-learning" title="Expand Learning">
          <button class="panel-toggle-btn">
            <i class="ti ti-chevron-left"></i>
          </button>
          <span class="vertical-text">LEARNING</span>
        </div>
        <div class="learning-scroll">
          <section class="learn-section">
            <div class="subpanel-title">Explain</div>
            <div id="explain-panel" class="panel-body learn-body"></div>
          </section>
          <section class="learn-section">
            <div id="case-study-panel" class="panel-body learn-body"></div>
          </section>
          <section class="learn-section">
            <div id="starter-query-panel" class="panel-body learn-body"></div>
          </section>
          <section class="learn-section">
            <div class="subpanel-title">Referensi Cepat</div>
            <div class="panel-body learn-body">
              <button id="learn-reference-launch" class="starter-btn" type="button">
                <i class="ti ti-book-2"></i>
                <span>Buka Glosarium & FAQ</span>
              </button>
            </div>
          </section>
          <section class="learn-section">
            <div id="history-panel" class="panel-body learn-body"></div>
          </section>
        </div>
      </aside>
    </main>

    <script type="module" src="/src/main.ts"></script>

    <div id="test-overlay" class="test-overlay" hidden>
      <div class="test-overlay-card">
        <div class="test-overlay-head">
          <b>Hasil Uji Stabilitas</b>
          <button id="test-close" type="button" class="link-btn">Tutup</button>
        </div>
        <div id="test-summary" class="test-summary"></div>
        <div id="test-detail" class="test-detail"></div>
      </div>
    </div>

    <div id="audit-overlay" class="test-overlay" hidden>
      <div class="test-overlay-card audit-card">
        <div class="test-overlay-head">
          <b><i class="ti ti-clipboard-list"></i> Histori Hasil Query</b>
          <div style="display:flex; gap:8px;">
            <button id="audit-export" type="button" class="link-btn"><i class="ti ti-download"></i> Export .txt</button>
            <button id="audit-clear" type="button" class="link-btn"><i class="ti ti-trash"></i> Clear</button>
            <button id="audit-close" type="button" class="link-btn">Tutup</button>
          </div>
        </div>
        <div id="audit-detail" class="test-detail"></div>
      </div>
    </div>

    <div id="reference-overlay" class="test-overlay" hidden>
      <div class="reference-overlay-card">
        <div class="test-overlay-head">
          <b><i class="ti ti-book-2"></i> Glosarium & FAQ SQL</b>
          <button id="reference-close" type="button" class="link-btn">Tutup</button>
        </div>
        <div class="reference-shell">
          <aside class="reference-sidebar">
            <input id="reference-search" class="app-input" placeholder="Cari istilah atau topik…" />
            <div id="reference-list" class="reference-list"></div>
          </aside>
          <section id="reference-detail" class="reference-detail"></section>
        </div>
      </div>
    </div>
  </body>
</html>
